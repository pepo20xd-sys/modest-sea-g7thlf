name: Deploy to GitHub Pages

on:
  push:
    branches:
      - principal   # Ajusta si tu rama principal se llama "main" o "master"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build site
        run: |
          mkdir -p ./dist
          echo "<h1>Hola GitHub Pages</h1>" > ./dist/index.html
          # Aquí pondrías tu comando de build real, por ejemplo npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
